services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lombard}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-lombard}
      POSTGRES_DB: ${POSTGRES_DB:-lombard}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lombard} -d ${POSTGRES_DB:-lombard}"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lombard}:${POSTGRES_PASSWORD:-lombard}@postgres:5432/${POSTGRES_DB:-lombard}

volumes:
  pgdata:
